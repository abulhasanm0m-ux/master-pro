version: '3.8'

services:
  windows-vm:
    build: .
    container_name: windows-vm
    devices:
      - /dev/kvm
    cpus: 4
    mem_limit: 8g
    ports:
      - "6080:6080"
      - "3389:3389"
    volumes:
      - windows_data:/data
      - windows_iso:/iso
    environment:
      - RAM=8192
      - CPU_CORES=4
      - DISK_SIZE=50G

volumes:
  windows_data:
  windows_iso:
